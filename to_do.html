<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="to_do.css">
</head>
<body>
<div class="container mt-5 mb-4">
    <div class="card shadow-lg p-5 bg-dark bg-opacity-50 text-white" style="width:80%; margin:auto;">
        <h2 class="text-center mb-4">📝 <b>My To-Do List</b></h2>

        <div class="input-group mb-5">
            <input type="text" id="taskInput" class="form-control" placeholder="Enter your task...!!">
            <button class="btn btn-primary" id="addTaskBtn"><b>Add Task</b></button>
        </div>

        <div class="text-center mb-3">
            <button class="btn btn-outline-light filter-btn " data-filter="all"><b>All</b></button>
            <button class="btn btn-outline-light filter-btn" data-filter="active"><b>Active</b></button>
            <button class="btn btn-outline-light filter-btn" data-filter="completed"><b>Completed</b></button>
        </div>

       
        <ul class="list-group" id="taskList">
        </ul>

    </div>
</div>

<script src="to_do.js"></script>
</body>
</html>
